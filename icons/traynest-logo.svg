<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nestGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98a4b"/>
      <stop offset="100%" stop-color="#a86a34"/>
    </linearGradient>
  </defs>

  <!-- eggs/tray-icon dots, cradled inside the nest's rim -->
  <circle cx="98" cy="164" r="19" fill="#3584e4"/>
  <circle cx="132" cy="157" r="23" fill="#f6d32d"/>
  <circle cx="166" cy="166" r="17" fill="#33d17a"/>

  <!-- rim highlight, sitting just behind the front lip of woven strands -->
  <path d="M42 178 Q128 132 214 178" fill="none" stroke="#e7a666" stroke-width="9"
        stroke-linecap="round" opacity="0.7"/>

  <!-- woven nest, built from overlapping arcs -->
  <g fill="none" stroke="url(#nestGradient)" stroke-width="12" stroke-linecap="round">
    <path d="M50 172 Q70 152 90 172 T130 172 T170 172 T206 172"/>
    <path d="M46 188 Q70 164 94 188 T142 188 T190 188 T210 188"/>
    <path d="M54 204 Q78 184 102 204 T150 204 T198 204"/>
  </g>
</svg>
